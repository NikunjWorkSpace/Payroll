services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${PAYBRIDGE_SA_PASSWORD:-PayBridgeStrongP@ssw0rd1}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
    command: >
      until /opt/mssql-tools18/bin/sqlcmd -C -S sqlserver -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" > /dev/null 2>&1; do
        echo "Waiting for SQL Server to accept connections...";
        sleep 5;
      done;
      /opt/mssql-tools18/bin/sqlcmd -C -S sqlserver -U sa -P "$$MSSQL_SA_PASSWORD" -i /workspace/SQL/Bootstrap.sql
    environment:
      MSSQL_SA_PASSWORD: ${PAYBRIDGE_SA_PASSWORD:-PayBridgeStrongP@ssw0rd1}
    volumes:
      - ./SQL:/workspace/SQL:ro
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=PayBridgeDb;User ID=sa;Password=${PAYBRIDGE_SA_PASSWORD:-PayBridgeStrongP@ssw0rd1};TrustServerCertificate=True;Encrypt=False;
    depends_on:
      db-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"

  web:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "4200:4200"
    depends_on:
      - api

volumes:
  sqlserver-data:
